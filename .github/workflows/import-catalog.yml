name: Import Catalog from XLSX

on:
  push:
    paths:
      - 'public/data/catalogo.xlsx'
  workflow_dispatch:

jobs:
  import-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run import script
        run: npm run import-catalog

      - name: Commit and push products.json if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/products.json
          git diff --staged --quiet || git commit -m "Auto-update products.json from catalogo.xlsx"
          git push
